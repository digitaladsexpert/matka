<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matka</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: linear-gradient(135deg,#0f2027,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:15px;
}

/* MAIN CARD */
.card{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:25px 20px;
    text-align:center;
    color:#fff;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* LOGO */
.logo img{
    width:80px;
    height:80px;
    border-radius:50%;
    margin-bottom:10px;
    border:3px solid #fff;
}

/* TITLE */
h1{
    font-size:26px;
    margin-bottom:10px;
}

/* TIMER */
.timer{
    font-size:24px;
    color:#ff4d4d;
    font-weight:600;
    margin:10px 0;
}

.labels{
    font-size:12px;
    color:#ccc;
}

/* BUTTON */
.btn{
    display:block;
    margin:20px auto;
    padding:14px;
    background:linear-gradient(45deg,#22c55e,#16a34a);
    border-radius:50px;
    color:#fff;
    font-size:16px;
    text-decoration:none;
    font-weight:600;
    box-shadow:0 5px 0 #0f7a33;
    transition:0.3s;
}

.btn:active{
    transform:scale(0.96);
}

/* SECTION */
.section-title{
    font-size:20px;
    margin:15px 0;
    font-weight:600;
}

.hindi{
    font-size:16px;
    line-height:1.6;
}

.footer{
    margin-top:15px;
    font-size:14px;
    opacity:0.9;
}

/* BADGE */
.badge{
    display:inline-block;
    background:#ffcc00;
    color:#000;
    padding:5px 12px;
    border-radius:20px;
    font-size:12px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="card">

    <!-- LOGO -->
    <div class="logo">
        <img src="matka.jpeg" alt="logo">
    </div>

    <div class="badge">🔥 Trusted Matka</div>

    <h1></h1>

    <!-- TIMER -->
    <div class="timer" id="timer">00 : 00 : 60</div>
    <div class="labels">HOURS • MINUTES • SECONDS</div>

    <!-- BUTTON -->
    <a href="https://kalyan-matka.online/kalyan.apk" class="btn">🚀 Click Here Now</a>

    <!-- CONTENT -->
    <div class="section-title">ALL MATKA GAMES</div>

    <div class="hindi">
        कल्याण, मैन बाजार, टाइम बाजार, श्रीदेवी <br><br>
        मिलन डे, मिलन नाइट, राजधनी नाइट <br><br>
        सभी मुंबई मार्केट के गेम यहाँ मिलेंगे।।
    </div>

    <div class="footer">
        📢 रोजाना फ्री गेम के लिए अभी Download करें
    </div>

</div>

<!-- TIMER SCRIPT -->
<script>
function startTimer(duration){
    let timer = duration;

    setInterval(function(){
        let hours = Math.floor(timer / 3600);
        let minutes = Math.floor((timer % 3600) / 60);
        let seconds = timer % 60;

        hours = hours < 10 ? "0"+hours : hours;
        minutes = minutes < 10 ? "0"+minutes : minutes;
        seconds = seconds < 10 ? "0"+seconds : seconds;

        document.getElementById("timer").innerHTML =
            hours + " : " + minutes + " : " + seconds;

        if(--timer < 0){
            timer = duration;
        }
    },1000);
}

// 2 hour timer
startTimer(7200);
</script>

</body>
</html>
